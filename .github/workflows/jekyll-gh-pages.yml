<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>База игр | Игровой каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0b0f1c 0%, #0a0e1a 100%);
            color: #eef2ff;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.7rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #8b9bcf;
            margin-top: 0.5rem;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: #11161fcc;
            backdrop-filter: blur(4px);
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            border: 1px solid #2d3a4e;
        }

        .search-box {
            flex: 2;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 2rem;
            border: none;
            background: #1e2538;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            background: #2a334a;
            box-shadow: 0 0 0 2px #3b4b6e;
            outline: none;
        }

        .genre-filter {
            flex: 1;
            min-width: 180px;
        }

        .stats {
            font-size: 0.9rem;
            background: #0f1420;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        /* ПЛАВНАЯ АНИМАЦИЯ ДЛЯ КАРТОЧЕК */
        .game-card {
            background: #11161f;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #252e3f;
            backdrop-filter: blur(2px);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.4s ease forwards;
        }

        .game-card:nth-child(1) { animation-delay: 0.00s; }
        .game-card:nth-child(2) { animation-delay: 0.05s; }
        .game-card:nth-child(3) { animation-delay: 0.10s; }
        .game-card:nth-child(4) { animation-delay: 0.15s; }
        .game-card:nth-child(5) { animation-delay: 0.20s; }
        .game-card:nth-child(6) { animation-delay: 0.25s; }
        .game-card:nth-child(7) { animation-delay: 0.30s; }
        .game-card:nth-child(8) { animation-delay: 0.35s; }
        .game-card:nth-child(9) { animation-delay: 0.40s; }
        .game-card:nth-child(10) { animation-delay: 0.45s; }
        .game-card:nth-child(11) { animation-delay: 0.50s; }
        .game-card:nth-child(12) { animation-delay: 0.55s; }
        .game-card:nth-child(13) { animation-delay: 0.60s; }
        .game-card:nth-child(14) { animation-delay: 0.65s; }
        .game-card:nth-child(15) { animation-delay: 0.70s; }
        .game-card:nth-child(16) { animation-delay: 0.75s; }
        .game-card:nth-child(17) { animation-delay: 0.80s; }
        .game-card:nth-child(18) { animation-delay: 0.85s; }
        .game-card:nth-child(19) { animation-delay: 0.90s; }
        .game-card:nth-child(20) { animation-delay: 0.95s; }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .game-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.5);
            border-color: #4b6e9e;
        }

        .game-img {
            height: 160px;
            background: #1f2a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #9bb5e6;
            flex-direction: column;
        }

        .game-info {
            padding: 1.2rem 1rem 1.4rem;
            flex: 1;
        }

        .game-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
        }

        .game-genre {
            display: inline-block;
            background: #1f2b3e;
            padding: 0.2rem 0.7rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b9d0ff;
            margin: 0.5rem 0 0.6rem;
        }

        .game-desc {
            font-size: 0.85rem;
            color: #b9c3e2;
            line-height: 1.4;
            margin-bottom: 0.8rem;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #7f8db0;
            border-top: 1px solid #232b3c;
            padding-top: 0.7rem;
            margin-top: auto;
        }

        .rating {
            color: #facc15;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: #0f1420aa;
            border-radius: 2rem;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Стили для пагинации */
        #pagination button:hover:not(:disabled) {
            background: #2a334a;
            border-color: #60a5fa;
        }

        #pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-btn {
            padding: 0.5rem 0.9rem;
            background: #1e2538;
            border: 1px solid #2d3a4e;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .page-btn:hover {
            background: #2a334a;
            border-color: #60a5fa;
        }

        .page-btn.active {
            background: #60a5fa;
            border-color: #60a5fa;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <button id="restartQuizBtn" style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #c084fc, #60a5fa);
        border: none;
        font-size: 1.8rem;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(96, 165, 250, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
        z-index: 1500;
        display: flex;
        align-items: center;
        justify-content: center;
    ">
        🎯
    </button>
    
    <div class="header">
        <h1>🎮 Игровая база</h1>
        <p>каталог игр с квиз-рекомендателем</p>
    </div>

    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию...">
        </div>
        <div class="genre-filter">
            <button id="openGenreBtn" style="
                width: 100%;
                padding: 0.8rem 1.2rem;
                border-radius: 2rem;
                background: #1e2538;
                border: 1px solid #2d3a4e;
                color: white;
                font-size: 1rem;
                cursor: pointer;
                text-align: left;
                transition: 0.2s;
            ">
                🎲 Все жанры
            </button>
        </div>
        <div class="stats" id="statsDisplay">📊 игр: 0</div>
    </div>

    <div class="games-grid" id="gamesGrid"></div>

    <div id="pagination" style="
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2.5rem;
        flex-wrap: wrap;
    ">
        <button id="prevPageBtn" style="
            padding: 0.5rem 1rem;
            background: #1e2538;
            border: 1px solid #2d3a4e;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        " disabled>◀ Назад</button>
        <div id="pageNumbers" style="display: flex; gap: 0.4rem; flex-wrap: wrap;"></div>
        <button id="nextPageBtn" style="
            padding: 0.5rem 1rem;
            background: #1e2538;
            border: 1px solid #2d3a4e;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        ">Вперёд ▶</button>
    </div>
</div>

<div id="genreModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center;">
    <div style="background: #11161f; max-width: 400px; width: 90%; border-radius: 2rem; padding: 2rem; border: 1px solid #4b6e9e; transform: scale(0.95); transition: transform 0.2s ease, opacity 0.2s ease;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">🎲 Выберите жанр</h2>
        <div id="genreOptionsList" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
        <button id="closeGenreModal" style="margin-top: 1.5rem; width: 100%; padding: 0.6rem; background: none; border: 1px solid #4b6e9e; border-radius: 1rem; color: #9bb5e6; cursor: pointer; transition: 0.2s;">Закрыть</button>
    </div>
</div>

<div id="gameModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: #11161f; max-width: 500px; width: 90%; border-radius: 2rem; padding: 2rem; border: 1px solid #4b6e9e; position: relative; box-shadow: 0 25px 40px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform 0.2s ease, opacity 0.2s ease;">
        <button id="closeModalBtn" style="position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #9bb5e6; transition: 0.2s;">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<div id="quizModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center;">
    <div style="background: #11161f; max-width: 550px; width: 90%; border-radius: 2rem; padding: 2rem; border: 1px solid #4b6e9e; max-height: 90vh; overflow-y: auto; transform: scale(0.95); transition: transform 0.2s ease, opacity 0.2s ease;">
        <div id="quizContent"></div>
    </div>
</div>

