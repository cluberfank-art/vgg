    // Защита от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Показать модальное окно с игрой с анимацией
    function showGameModal(game) {
        const modal = document.getElementById('gameModal');
        const modalContent = document.getElementById('modalContent');
        const modalInner = modal.querySelector('div:first-child');
        
        modalContent.innerHTML = `
            <div style="text-align: center;">
                <div style="font-size: 4rem;">${game.icon}</div>
                <h2 style="font-size: 1.8rem; margin: 0.5rem 0; color: #eef2ff;">${escapeHtml(game.title)}</h2>
                <div style="background: #1f2b3e; display: inline-block; padding: 0.3rem 1rem; border-radius: 2rem; margin: 0.5rem 0;">
                    🎭 ${game.genre} | 📅 ${game.year} | ⭐ ${game.rating}
                </div>
                <p style="margin: 1.5rem 0; line-height: 1.6; color: #b9c3e2; text-align: left; background: #0a0e1a; padding: 1rem; border-radius: 1rem;">
                    ${escapeHtml(game.desc)}
                </p>
                <div style="font-size: 0.8rem; color: #7f8db0;">🆔 ID: ${game.id}</div>
            </div>
        `;
        
        modal.style.display = 'flex';
        setTimeout(() => {
            if (modalInner) modalInner.style.transform = 'scale(1)';
        }, 10);
    }

    // Отрисовка карточек игр с плавной анимацией
    function renderGames(filteredGames) {
        const grid = document.getElementById('gamesGrid');
        if (!grid) return;

        if (filteredGames.length === 0) {
            grid.innerHTML = `<div class="no-results">😢 Ничего не найдено...</div>`;
            return;
        }

        let html = '';
        for (let i = 0; i < filteredGames.length; i++) {
            const game = filteredGames[i];
            html += `
                <div class="game-card" data-id="${game.id}">
                    <div class="game-img">
                        <span style="font-size: 3rem;">${game.icon}</span>
                        <span style="font-size: 0.7rem; opacity: 0.7;">${game.year}</span>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-genre">🎭 ${game.genre}</div>
                        <div class="game-desc">${escapeHtml(game.desc.substring(0, 80))}${game.desc.length > 80 ? '...' : ''}</div>
                        <div class="game-meta">
                            <span>📅 ${game.year}</span>
                            <span class="rating">⭐ ${game.rating}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        grid.innerHTML = html;

        const cards = document.querySelectorAll('.game-card');
        for (let i = 0; i < cards.length; i++) {
            cards[i].addEventListener('click', function() {
                const gameId = parseInt(this.getAttribute('data-id'));
                let foundGame = null;
                for (let j = 0; j < gamesDatabase.length; j++) {
                    if (gamesDatabase[j].id === gameId) {
                        foundGame = gamesDatabase[j];
                        break;
                    }
                }
                if (foundGame) showGameModal(foundGame);
            });
        }
    }

    // === ПАГИНАЦИЯ (объявляем первой) ===
    let currentPage = 1;
    let gamesPerPage = 24;
    let currentFilteredGames = [];

    function renderGamesWithPagination(filteredGames) {
        currentFilteredGames = filteredGames;
        currentPage = 1;
        
        const totalPages = Math.ceil(filteredGames.length / gamesPerPage);
        const startIndex = (currentPage - 1) * gamesPerPage;
        const endIndex = startIndex + gamesPerPage;
        const gamesToShow = filteredGames.slice(startIndex, endIndex);
        
        renderGames(gamesToShow);
        updatePaginationControls(totalPages);
        updateStatsDisplay(filteredGames.length);
    }
    
    function updatePaginationControls(totalPages) {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageNumbersDiv = document.getElementById('pageNumbers');
        
        if (!prevBtn || !nextBtn || !pageNumbersDiv) return;
        
        prevBtn.disabled = (currentPage === 1);
        nextBtn.disabled = (currentPage === totalPages || totalPages === 0);
        
        let pagesHtml = '';
        let startPage = Math.max(1, currentPage - 3);
        let endPage = Math.min(totalPages, currentPage + 3);
        
        if (startPage > 1) {
            pagesHtml += `<button class="page-btn" data-page="1">1</button>`;
            if (startPage > 2) pagesHtml += `<span style="color: #7f8db0;">...</span>`;
        }
        
        for (let i = startPage; i <= endPage; i++) {
            pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) pagesHtml += `<span style="color: #7f8db0;">...</span>`;
            pagesHtml += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
        }
        
        pageNumbersDiv.innerHTML = pagesHtml;
        
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = parseInt(btn.getAttribute('data-page'));
                if (!isNaN(page) && page !== currentPage) {
                    currentPage = page;
                    const startIndex = (currentPage - 1) * gamesPerPage;
                    const endIndex = startIndex + gamesPerPage;
                    const gamesToShow = currentFilteredGames.slice(startIndex, endIndex);
                    renderGames(gamesToShow);
                    updatePaginationControls(totalPages);
                    document.querySelector('.games-grid').scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    }
    
    function updateStatsDisplay(count) {
        const statsSpan = document.getElementById('statsDisplay');
        if (statsSpan) {
            const totalPages = Math.ceil(count / gamesPerPage);
            statsSpan.innerHTML = `📊 игр: ${count} | 📄 стр. ${currentPage} из ${totalPages || 1}`;
        }
    }

    // Переменная для хранения текущего выбранного жанра
    let currentGenre = "all";

    // Функция фильтрации игр
    function filterGames() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        
        const filtered = [];
        for (let i = 0; i < gamesDatabase.length; i++) {
            const game = gamesDatabase[i];
            if (currentGenre !== 'all' && game.genre !== currentGenre) continue;
            if (searchTerm && !game.title.toLowerCase().includes(searchTerm)) continue;
            filtered.push(game);
        }
        
        renderGamesWithPagination(filtered);
    }

    // --- МОДАЛЬНОЕ ОКНО ВЫБОРА ЖАНРА ---
    const genresList = [
        { value: "all", label: "Все жанры", emoji: "🎲" },
        { value: "RPG", label: "RPG", emoji: "🧙" },
        { value: "Action", label: "Action", emoji: "⚔️" },
        { value: "Adventure", label: "Adventure", emoji: "🗺️" },
        { value: "Indie", label: "Indie", emoji: "🎨" },
        { value: "Shooter", label: "Shooter", emoji: "🔫" },
        { value: "Racing", label: "Racing", emoji: "🏎️" },
        { value: "Puzzle", label: "Puzzle", emoji: "🧩" },
        { value: "Arcade", label: "Arcade", emoji: "👾" },
        { value: "Fighting", label: "Fighting", emoji: "🥊" },
        { value: "Platformer", label: "Platformer", emoji: "🍄" },
        { value: "Simulator", label: "Simulator", emoji: "🎮" },
        { value: "Strategy", label: "Strategy", emoji: "♟️" },
        { value: "Party", label: "Party", emoji: "🎉" },
        { value: "Sports", label: "Sports", emoji: "⚽" },
        { value: "Horror", label: "Horror", emoji: "😱" },
        { value: "Sandbox", label: "Sandbox", emoji: "🏗️" }
    ];

    function openGenreModal() {
        const modal = document.getElementById('genreModal');
        const container = document.getElementById('genreOptionsList');
        const modalInner = modal.querySelector('div:first-child');
        
        let buttonsHtml = '';
        for (let i = 0; i < genresList.length; i++) {
            const g = genresList[i];
            const isActive = (currentGenre === g.value);
            buttonsHtml += `
                <button class="genre-option-btn" data-genre="${g.value}" style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    padding: 0.8rem 1rem;
                    background: ${isActive ? '#2a334a' : '#1e2538'};
                    border: 1px solid ${isActive ? '#60a5fa' : '#2d3a4e'};
                    border-radius: 1rem;
                    color: white;
                    font-size: 1rem;
                    cursor: pointer;
                    transition: all 0.2s ease;
                ">
                    <span style="font-size: 1.3rem;">${g.emoji}</span>
                    <span style="flex: 1; text-align: left;">${g.label}</span>
                    ${isActive ? '<span>✅</span>' : ''}
                </button>
            `;
        }
        
        container.innerHTML = buttonsHtml;
        modal.style.display = 'flex';
        
        setTimeout(() => {
            if (modalInner) modalInner.style.transform = 'scale(1)';
        }, 10);
        
        document.querySelectorAll('.genre-option-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const selectedGenre = this.getAttribute('data-genre');
                currentGenre = selectedGenre;
                
                const selectedGenreObj = genresList.find(g => g.value === selectedGenre);
                const openBtn = document.getElementById('openGenreBtn');
                if (openBtn && selectedGenreObj) {
                    if (selectedGenre === 'all') {
                        openBtn.innerHTML = `🎲 Все жанры`;
                    } else {
                        openBtn.innerHTML = `${selectedGenreObj.emoji} ${selectedGenreObj.label}`;
                    }
                }
                
                filterGames();
                closeGenreModal();
            });
            
            btn.addEventListener('mouseenter', function() {
                this.style.background = '#2a334a';
                this.style.borderColor = '#60a5fa';
            });
            btn.addEventListener('mouseleave', function() {
                const isActive = (currentGenre === this.getAttribute('data-genre'));
                this.style.background = isActive ? '#2a334a' : '#1e2538';
                this.style.borderColor = isActive ? '#60a5fa' : '#2d3a4e';
            });
        });
    }

    function closeGenreModal() {
        const modal = document.getElementById('genreModal');
        const modalInner = modal.querySelector('div:first-child');
        if (modalInner) modalInner.style.transform = 'scale(0.95)';
        setTimeout(() => {
            modal.style.display = 'none';
        }, 150);
    }

    function closeGameModal() {
        const modal = document.getElementById('gameModal');
        const modalInner = modal.querySelector('div:first-child');
        if (modalInner) modalInner.style.transform = 'scale(0.95)';
        setTimeout(() => {
            modal.style.display = 'none';
            if (modalInner) modalInner.style.transform = 'scale(0.95)';
        }, 150);
    }

    // Обработчики модалок
    const closeBtn = document.getElementById('closeModalBtn');
    if (closeBtn) closeBtn.addEventListener('click', closeGameModal);

    const modal = document.getElementById('gameModal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeGameModal();
        });
    }

    const genreModal = document.getElementById('genreModal');
    if (genreModal) {
        genreModal.addEventListener('click', function(e) {
            if (e.target === this) closeGenreModal();
        });
    }

    const closeGenreModalBtn = document.getElementById('closeGenreModal');
    if (closeGenreModalBtn) closeGenreModalBtn.addEventListener('click', closeGenreModal);

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeGameModal();
            closeGenreModal();
            const quizModal = document.getElementById('quizModal');
            if (quizModal && quizModal.style.display === 'flex') {
                const quizInner = quizModal.querySelector('div:first-child');
                if (quizInner) quizInner.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    quizModal.style.display = 'none';
                }, 150);
            }
        }
    });

    // Подключаем поиск
    const searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.addEventListener('input', filterGames);
    
    const openGenreBtn = document.getElementById('openGenreBtn');
    if (openGenreBtn) openGenreBtn.addEventListener('click', openGenreModal);

    // Обработчики кнопок пагинации
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    
    if (prevBtn) {
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                const startIndex = (currentPage - 1) * gamesPerPage;
                const endIndex = startIndex + gamesPerPage;
                const gamesToShow = currentFilteredGames.slice(startIndex, endIndex);
                renderGames(gamesToShow);
                const totalPages = Math.ceil(currentFilteredGames.length / gamesPerPage);
                updatePaginationControls(totalPages);
                updateStatsDisplay(currentFilteredGames.length);
                document.querySelector('.games-grid').scrollIntoView({ behavior: 'smooth' });
            }
        });
    }
    
    if (nextBtn) {
        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(currentFilteredGames.length / gamesPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                const startIndex = (currentPage - 1) * gamesPerPage;
                const endIndex = startIndex + gamesPerPage;
                const gamesToShow = currentFilteredGames.slice(startIndex, endIndex);
                renderGames(gamesToShow);
                updatePaginationControls(totalPages);
                updateStatsDisplay(currentFilteredGames.length);
                document.querySelector('.games-grid').scrollIntoView({ behavior: 'smooth' });
            }
        });
    }

    // --- КВИЗ ---
    const quizQuestions = [
        { text: "🎮 Какой жанр вам нравится?", options: ["RPG", "Action", "Adventure", "Indie", "Shooter", "Racing", "Puzzle", "Platformer", "Strategy", "Horror", "Fighting"] },
        { text: "⚔️ Что для вас важнее?", options: ["Сюжет", "Геймплей", "Графика", "Мультиплеер"] },
        { text: "⏱️ Сколько времени готовы уделять?", options: ["До 10ч", "10-30ч", "30-100ч", "100+ч"] },
        { text: "🎨 Какой стиль?", options: ["Реализм", "Фэнтези", "Фантастика", "Пиксель-арт"] },
        { text: "🤺 Сложность?", options: ["Лёгкая", "Средняя", "Высокая", "Не важно"] }
    ];

    let currentQuestion = 0;
    let userAnswers = [];

    function showQuiz() {
        const modal = document.getElementById('quizModal');
        const modalInner = modal.querySelector('div:first-child');
        modal.style.display = 'flex';
        setTimeout(() => {
            if (modalInner) modalInner.style.transform = 'scale(1)';
        }, 10);
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizQuestions[currentQuestion];
        let optionsHtml = '';
        for (let i = 0; i < q.options.length; i++) {
            optionsHtml += `<button class="quiz-opt" data-val="${q.options[i]}" style="display: block; width: 100%; padding: 0.8rem; margin: 0.5rem 0; background: #1e2538; border: 1px solid #2d3a4e; border-radius: 1rem; color: white; cursor: pointer; transition: 0.2s;">${q.options[i]}</button>`;
        }
        
        document.getElementById('quizContent').innerHTML = `
            <h2>🎯 Вопрос ${currentQuestion + 1} из 5</h2>
            <p style="margin: 1rem 0; color: #c084fc;">${q.text}</p>
            <div>${optionsHtml}</div>
            <div style="margin-top: 1rem; display: flex; justify-content: space-between;">
                <button id="quizPrev" style="padding: 0.5rem 1rem; background: #2d3a4e; border: none; border-radius: 1rem; color: white; cursor: pointer; transition: 0.2s;">◀ Назад</button>
                <button id="quizSkip" style="padding: 0.5rem 1rem; background: none; border: 1px solid #4b6e9e; border-radius: 1rem; color: #9bb5e6; cursor: pointer; transition: 0.2s;">Пропустить</button>
            </div>
        `;
        
        document.querySelectorAll('.quiz-opt').forEach(btn => {
            btn.onclick = () => {
                userAnswers[currentQuestion] = btn.getAttribute('data-val');
                if (currentQuestion + 1 < quizQuestions.length) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    finishQuiz();
                }
            };
            btn.addEventListener('mouseenter', function() { this.style.background = '#2a334a'; });
            btn.addEventListener('mouseleave', function() { this.style.background = '#1e2538'; });
        });
        
        const quizPrev = document.getElementById('quizPrev');
        if (quizPrev) {
            quizPrev.onclick = () => {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    renderQuestion();
                }
            };
        }
        
        const quizSkip = document.getElementById('quizSkip');
        if (quizSkip) {
            quizSkip.onclick = () => closeQuiz();
        }
    }

    function finishQuiz() {
        const selectedGenre = userAnswers[0];
        
        if (!selectedGenre) {
            closeQuiz();
            return;
        }
        
        let filteredGames = gamesDatabase.filter(game => game.genre === selectedGenre);
        
        if (filteredGames.length === 0) {
            document.getElementById('quizContent').innerHTML = `
                <h2>😢 Нет игр в жанре "${selectedGenre}"</h2>
                <p>Попробуйте другой жанр в следующий раз!</p>
                <button id="closeQuizBtn" style="margin-top: 1rem; padding: 0.8rem; background: #60a5fa; border: none; border-radius: 1rem; color: white; cursor: pointer; transition: 0.2s;">Закрыть</button>
            `;
            const closeQuizBtn = document.getElementById('closeQuizBtn');
            if (closeQuizBtn) closeQuizBtn.onclick = () => closeQuiz();
            return;
        }
        
        filteredGames = filteredGames.sort((a, b) => {
            let scoreA = 0, scoreB = 0;
            
            if (userAnswers[1] === "Сюжет" && a.genre === "RPG") scoreA += 1;
            if (userAnswers[1] === "Сюжет" && b.genre === "RPG") scoreB += 1;
            
            if (userAnswers[2] === "100+ч" && a.genre !== "Indie") scoreA += 0.5;
            if (userAnswers[2] === "100+ч" && b.genre !== "Indie") scoreB += 0.5;
            
            if (userAnswers[3] === "Реализм" && ["Action", "Shooter"].includes(a.genre)) scoreA += 0.5;
            if (userAnswers[3] === "Реализм" && ["Action", "Shooter"].includes(b.genre)) scoreB += 0.5;
            if (userAnswers[3] === "Фэнтези" && a.genre === "RPG") scoreA += 0.5;
            if (userAnswers[3] === "Фэнтези" && b.genre === "RPG") scoreB += 0.5;
            
            if (userAnswers[4] === "Высокая" && a.rating >= 9.5) scoreA += 0.5;
            if (userAnswers[4] === "Высокая" && b.rating >= 9.5) scoreB += 0.5;
            
            if (b.rating !== a.rating) return b.rating - a.rating;
            return scoreB - scoreA;
        }).slice(0, 5);
        
        let recHtml = `<h2>🎉 Рекомендации (жанр: ${selectedGenre})</h2><div style="max-height: 350px; overflow-y: auto;">`;
        for (let i = 0; i < filteredGames.length; i++) {
            recHtml += `<div style="background: #1e2538; border-radius: 1rem; padding: 0.8rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 1rem; transition: 0.2s;">
                <span style="font-size: 2rem;">${filteredGames[i].icon}</span>
                <div><div style="font-weight: bold;">${filteredGames[i].title}</div><div style="font-size: 0.8rem;">⭐ ${filteredGames[i].rating} • ${filteredGames[i].year}</div></div>
            </div>`;
        }
        recHtml += '</div><button id="closeQuizBtn" style="margin-top: 1rem; width: 100%; padding: 0.8rem; background: #60a5fa; border: none; border-radius: 1rem; color: white; cursor: pointer; transition: 0.2s;">Закрыть</button>';
        
        document.getElementById('quizContent').innerHTML = recHtml;
        const closeQuizBtn = document.getElementById('closeQuizBtn');
        if (closeQuizBtn) closeQuizBtn.onclick = () => closeQuiz();
    }

    function closeQuiz() {
        const modal = document.getElementById('quizModal');
        const modalInner = modal.querySelector('div:first-child');
        if (modalInner) modalInner.style.transform = 'scale(0.95)';
        setTimeout(() => {
            modal.style.display = 'none';
            if (modalInner) modalInner.style.transform = 'scale(0.95)';
        }, 150);
        if (!localStorage.getItem('quizCompleted')) {
            localStorage.setItem('quizCompleted', 'true');
        }
    }

    // Показываем квиз при первом заходе
    if (!localStorage.getItem('quizCompleted')) {
        setTimeout(() => showQuiz(), 500);
    }

    // Кнопка перезапуска квиза
    const restartBtn = document.getElementById('restartQuizBtn');
    if (restartBtn) {
        restartBtn.addEventListener('click', () => {
            currentQuestion = 0;
            userAnswers = [];
            showQuiz();
        });
        restartBtn.addEventListener('mouseenter', function() { this.style.transform = 'scale(1.1)'; });
        restartBtn.addEventListener('mouseleave', function() { this.style.transform = 'scale(1)'; });
    }
    
    // СТАРТОВЫЙ РЕНДЕР
    renderGamesWithPagination(gamesDatabase);
</script>
</body>
</html>
